name: CI/CD Frontend Dev

on:
  pull_request:
    branches:
      - dev # Lint and build on PR to dev
  push:
    branches:
      - dev # Deploy on merge to dev
  workflow_dispatch: # Allow manual trigger

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

  build:
    name: Build
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Create .env file
        run: echo "$ENV_FILE_CONTENT" > .env
        env:
          ENV_FILE_CONTENT: ${{ secrets.ENV_FILE }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

  deploy:
    name: Deploy Frontend (Development)
    runs-on: ubuntu-latest
    needs: [lint, build]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Create .env file
        run: echo "$ENV_FILE_CONTENT" > .env
        env:
          ENV_FILE_CONTENT: ${{ secrets.ENV_FILE }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Prepare standalone deployment
        run: |
          cp -r .next/static .next/standalone/.next/static
          [ -d public ] && cp -r public .next/standalone/public

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}

      - name: Ensure deployment directory exists
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts \
            "$DEPLOY_TARGET" \
            "mkdir -p /home/$SERVER_USER/storytime/development/waitlist"
        env:
          DEPLOY_TARGET: ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}

      - name: Deploy standalone build
        run: |
          rsync -avz --delete \
            --exclude='.env' \
            -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts" \
            .next/standalone/ \
            ecosystem.config.js \
            "$DEPLOY_TARGET:/home/$SERVER_USER/storytime/development/waitlist/"
        env:
          DEPLOY_TARGET: ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}

      - name: Deploy static assets
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts" \
            .next/static/ \
            "$DEPLOY_TARGET:/home/$SERVER_USER/storytime/development/waitlist/.next/static/"
        env:
          DEPLOY_TARGET: ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}

      - name: Deploy public assets
        run: |
          if [ -d public ]; then
            rsync -avz --delete \
              -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts" \
              public/ \
              "$DEPLOY_TARGET:/home/$SERVER_USER/storytime/development/waitlist/public/"
          fi
        env:
          DEPLOY_TARGET: ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}

      - name: Create .env on server
        run: |
          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts \
            .env \
            "$DEPLOY_TARGET:/home/$SERVER_USER/storytime/development/waitlist/.env"
        env:
          DEPLOY_TARGET: ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}

      - name: Restart app
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts \
            "$DEPLOY_TARGET" \
            "source ~/.nvm/nvm.sh && cd /home/$SERVER_USER/storytime/development/waitlist && (npx pm2 restart storytime-waitlist-development --update-env || npx pm2 start ecosystem.config.js --only storytime-waitlist-development) && npx pm2 save"
        env:
          DEPLOY_TARGET: ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "Development deployment successful!"
          else
            echo "Development deployment failed!"
          fi
